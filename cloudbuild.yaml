steps:
  # 0. Start local PostgreSQL database for QA step
  - name: "gcr.io/cloud-builders/docker"
    id: "Start Postgres"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        docker run -d \
          --name postgres \
          --network cloudbuild \
          -e POSTGRES_USER=powercord \
          -e POSTGRES_PASSWORD=test_pass \
          -e POSTGRES_DB=postgres \
          postgres:15-alpine

  # 1. Install dependencies and run QA
  - name: "python:3.12"
    id: "Run QA"
    entrypoint: "bash"
    env:
      - "POWERCORD_DB_HOST=postgres:5432"
    args:
      - "-c"
      - |
        pip install poetry
        poetry install
        # Wait for Postgres to be ready
        poetry run python -c "import textwrap; exec(textwrap.dedent('''
        import time
        from sqlalchemy import create_engine
        url = 'postgresql+pg8000://powercord:test_pass@postgres:5432/postgres'
        for i in range(30):
            try:
                engine = create_engine(url)
                with engine.connect() as conn:
                    print('PostgreSQL is ready!')
                    break
            except Exception as e:
                print(f'Waiting for database... ({e})')
                time.sleep(1)
        else:
            raise RuntimeError('Database did not start in time')
        '''))"
        poetry run ruff check .
        poetry run ruff format --check .
        poetry run mypy .
        poetry run pytest tests -m "not integration"

  # 2. Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    id: "Build Docker Image"
    env:
      - "DOCKER_BUILDKIT=1"
    args:
      [
        "build",
        "-t",
        "us-central1-docker.pkg.dev/$PROJECT_ID/powercord/powercord-app:$BUILD_ID",
        "-t",
        "us-central1-docker.pkg.dev/$PROJECT_ID/powercord/powercord-app:latest",
        ".",
      ]

  # 3. Push the Docker image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    id: "Push Docker Image"
    args:
      [
        "push",
        "--all-tags",
        "us-central1-docker.pkg.dev/$PROJECT_ID/powercord/powercord-app",
      ]

  # 4. Initialize Terraform
  - name: "hashicorp/terraform:latest"
    id: "Terraform Init"
    dir: "terraform"
    args:
      - "init"
      - "-backend-config=bucket=${PROJECT_ID}-tf-state"

  # 5. Apply Terraform Infrastructure
  - name: "hashicorp/terraform:latest"
    id: "Terraform Apply"
    dir: "terraform"
    env:
      - "TF_VAR_project_id=${PROJECT_ID}"
      - "TF_VAR_docker_image=us-central1-docker.pkg.dev/${PROJECT_ID}/powercord/powercord-app:${BUILD_ID}"
    args:
      - "apply"
      - "-auto-approve"

images:
  - "us-central1-docker.pkg.dev/$PROJECT_ID/powercord/powercord-app:$BUILD_ID"

options:
  logging: CLOUD_LOGGING_ONLY
