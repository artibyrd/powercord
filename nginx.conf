worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /dev/stdout;
    error_log /dev/stderr;

    sendfile        on;
    keepalive_timeout  65;

    # Define the upstream servers for our applications
    upstream fastapi_server {
        server 127.0.0.1:8000;
    }
    upstream fasthtml_server {
        server 127.0.0.1:5001;
    }

    server {
        listen 80;
        listen 443 ssl;

        ssl_certificate /etc/nginx/cert.pem;
        ssl_certificate_key /etc/nginx/key.pem;

        # Route API traffic to the FastAPI backend
        location /api {
            proxy_pass http://fastapi_server;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Route all other traffic to the FastHTML frontend
        location / {
            proxy_pass http://fasthtml_server;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Required for WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ┌─────────────────────────────────────────────────────────────────┐
    # │ BEGIN LEGACY: v2 BardBot API Migration                         │
    # │ See docs/LEGACY_V2_MIGRATION.md for context and removal guide. │
    # │ Safe to delete this entire block for fresh Powercord installs. │
    # └─────────────────────────────────────────────────────────────────┘
    # Routes legacy LuteBot traffic (api.bardsguild.life) to the v3
    # compatibility shim.  LuteBot sends: GET /?key=API_KEY&find=TERM
    # Nginx rewrites the root path → /midi_library/legacy/ on FastAPI.
    server {
        listen 80;
        listen 443 ssl;
        server_name api.bardsguild.life;

        ssl_certificate /etc/nginx/cert.pem;
        ssl_certificate_key /etc/nginx/key.pem;

        location / {
            proxy_pass http://fastapi_server/midi_library/legacy/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
    # ── END LEGACY ────────────────────────────────────────────────────
}
